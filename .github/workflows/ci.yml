name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint, typecheck, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: donsend
          POSTGRES_PASSWORD: password
          POSTGRES_DB: donsend
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Typecheck (mypy)
        run: uv run mypy app/ tests/ scripts/

      - name: Test (pytest)
        env:
          TEST_DATABASE_URL: postgresql+psycopg://donsend:password@localhost:5432/donsend
          DATABASE_URL: postgresql+psycopg://donsend:password@localhost:5432/donsend
          SECRET_KEY: ci-test-secret-not-used-in-production-32-bytes-min
        run: uv run pytest

  frontend:
    name: Frontend — typecheck, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck + build
        run: npm run build
